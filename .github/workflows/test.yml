# CI на PR и push в main: pytest + ruff. mypy — пока soft (continue-on-error)
# чтобы не блокировать коммиты на legacy untyped code; включим как hard gate
# когда покроем основные модули аннотациями.
name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # pyproject.toml объявляет requires-python = ">=3.10"; проверяем что
      # код реально работает на всём заявленном диапазоне. Прод на 3.12.
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      # ruff format пока advisory: codebase ещё не прогнан через formatter
      # (отдельный задача-уборка с большим diff). Не блокируем PR'ы.
      - name: Format check (ruff, advisory)
        run: ruff format --check . || true

      - name: Type-check (mypy, soft)
        run: mypy pik bin
        continue-on-error: true

      - name: Test (pytest)
        run: pytest

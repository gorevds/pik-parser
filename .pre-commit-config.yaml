# Запускаем ruff (линт + форматтер) перед каждым коммитом — ловим
# typo/unused-import/syntax-error на этапе git-add вместо CI/PR-ревью.
# Уст. локально через: `pip install pre-commit && pre-commit install`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        # 1000КБ — порог; БД и бэкапы в git не лезут (.gitignore их режет).
        # Голден-fixture'ы JSON-ответов от больших API могут перевалить за
        # 500КБ — поднимаем порог, чтобы запас был.
        args: [--maxkb=1000]

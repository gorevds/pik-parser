server {
    listen 80;
    listen [::]:80;
    server_name pik.gorev.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pik.gorev.space;

    ssl_certificate     /etc/letsencrypt/live/pik.gorev.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pik.gorev.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # JSON-ответы today_all ~47 МБ сырыми; gzip жмёт их в ~6-8 раз и режет
    # 4с загрузки до ~0.5с. comp_level 6 — золотая середина CPU/ratio.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/html
        image/svg+xml;

    root /opt/pik/static;
    index index.html;

    # /api/* — proxy на Datasette с обрезанием префикса
    location /api/ {
        proxy_pass http://127.0.0.1:5051/;
        # proxy_http_version 1.1 обязателен: дефолт 1.0, а nginx gzip
        # пропускает HTTP/1.0 ответы (gzip_http_version=1.1 default).
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    # Сегодняшний срез меняется раз в сутки (06:00/06:30 МСК) — браузеру
    # можно кешировать на полчаса, повторное открытие тогда мгновенное.
    # `^~` чтобы выиграть приоритет у regex-локации `~ ^/(pik|-)/ ` ниже.
    # Все три серверных add_header'а повторены, иначе add_header Cache-Control
    # «съел бы» унаследованные заголовки (правило nginx о наследовании).
    location ^~ /pik/today_all.json {
        proxy_pass http://127.0.0.1:5051;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Cache-Control "public, max-age=1800" always;
    }

    # Прямой доступ к Datasette по /pik/*, /-/* для обратной совместимости
    location ~ ^/(pik|-)/ {
        proxy_pass http://127.0.0.1:5051;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    # Всё прочее — пробуем как статику, иначе 404
    location / {
        try_files $uri $uri/ =404;
    }
}

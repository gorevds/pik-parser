server {
    listen 80;
    listen [::]:80;
    server_name pik.gorev.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pik.gorev.space;

    ssl_certificate     /etc/letsencrypt/live/pik.gorev.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pik.gorev.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /opt/pik/static;
    index index.html;

    # /api/* — proxy на Datasette с обрезанием префикса
    location /api/ {
        proxy_pass http://127.0.0.1:5051/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    # Прямой доступ к Datasette по /pik/*, /-/* для обратной совместимости
    location ~ ^/(pik|-)/ {
        proxy_pass http://127.0.0.1:5051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    # Всё прочее — пробуем как статику, иначе 404
    location / {
        try_files $uri $uri/ =404;
    }
}

# Rate-limit zone — 10 запросов/сек на IP, burst до 20 (без задержки). Защищает
# Datasette от наплыва на today_all.json (~6 МБ сжатых) и от crawler'ов,
# дёргающих /pik/flats.json?_size=25000 без cache. Голос за zone-name `pik`
# в http-контексте (этот файл инклудится в http{} через sites-enabled).
limit_req_zone $binary_remote_addr zone=pik_rate:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name pik.gorev.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # На сервере nginx stream{} (см. /etc/nginx/stream.d/mtg.conf) держит
    # :443 и SNI-демультиплексирует трафик: всё, что не www.microsoft.com,
    # идёт на 127.0.0.1:8443 с PROXY protocol для real client IP. Все
    # HTTP-vhost'ы слушают тут (websh, websh-m, lmf, pik).
    listen 127.0.0.1:8443 ssl http2 proxy_protocol;
    server_name pik.gorev.space;
    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;

    ssl_certificate     /etc/letsencrypt/live/pik.gorev.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pik.gorev.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # CSP-Report-Only: пока только логируем нарушения через devtools console
    # каждого посетителя (нет нашего report-endpoint'а). Минимальный
    # цикл закрытия: открыть страницу в Firefox/Chrome, посмотреть SecurityError
    # в Console, добавить промахнувшийся источник, повторить — пока чисто.
    # Затем переключить заголовок на Content-Security-Policy (без -Report-Only).
    #
    #   script-src: Tabulator+Chart.js с jsdelivr, Yandex Maps API.
    #     yastatic.net — Yandex's CDN для воркеров/иконок (загружается из maps).
    #     'unsafe-inline' — в index.html/flat.html весь JS инлайн.
    #     'unsafe-eval' — Yandex Maps использует new Function() для шаблонов.
    #   style-src: Tabulator CSS с jsdelivr + инлайн-стили в нашем HTML.
    #   img-src: data: для inline-svg, https: для favicon Yandex и tile-карт,
    #     yastatic.net для иконных спрайтов Maps.
    #   connect-src: 'self' для /pik/*.json, *.maps.yandex.net для тайлов.
    add_header Content-Security-Policy-Report-Only
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://api-maps.yandex.ru https://*.maps.yandex.net https://yastatic.net; \
         style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; \
         img-src 'self' data: https:; \
         connect-src 'self' https://*.maps.yandex.net https://api-maps.yandex.ru; \
         font-src 'self' data:; \
         frame-ancestors 'none'; \
         base-uri 'self'; \
         form-action 'self';"
        always;

    # JSON-ответы today_all ~47 МБ сырыми; gzip жмёт их в ~6-8 раз и режет
    # 4с загрузки до ~0.5с. comp_level 6 — золотая середина CPU/ratio.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/html
        image/svg+xml;

    root /opt/pik/static;
    index index.html;

    # /-/* — диагностика Datasette (versions, threads, databases, settings,
    # plugins, metadata). Раньше она светилась наружу и раскрывала
    # серверные пути/версии. Закрыто 404 — фронт ничего из этого не дёргает.
    location ^~ /-/ {
        return 404;
    }

    # /api/ — раньше тут был прозрачный proxy на Datasette, через который
    # арбитражный SQL (?sql=…) был доступен анонимно. После default_allow_sql
    # off на сервере /_sql отвечает 403, но сам /api/ больше не нужен:
    # фронт пользуется /pik/*.json напрямую через регексп-локацию ниже.
    location ^~ /api/ {
        return 404;
    }

    # Сегодняшний срез меняется раз в сутки (06:00/06:30 МСК) — браузеру
    # можно кешировать на полчаса, повторное открытие тогда мгновенное.
    # `^~` чтобы выиграть приоритет у regex-локации `~ ^/(pik|-)/ ` ниже.
    # Все add_header'ы повторены, иначе add_header Cache-Control «съел бы»
    # унаследованные заголовки (правило nginx о наследовании).
    location ^~ /pik/today_all.json {
        # Дешёвый эндпоинт — rate чуть выше, burst чуть шире (плагины
        # рендерят его частыми мелкими подгрузками при свайпе по фильтрам)
        limit_req zone=pik_rate burst=30 nodelay;

        proxy_pass http://127.0.0.1:5051;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        # add_header только добавляет — Datasette шлёт max-age=5, и браузер
        # по RFC возьмёт минимум. Прячем upstream-заголовок и ставим свой.
        proxy_hide_header Cache-Control;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Cache-Control "public, max-age=1800" always;
    }

    # Sparkline-история тоже меняется только после ночного скана — тот же
    # cache 30 мин (~1-3МБ gzip, без cache повторное открытие = повторная
    # перекачка).
    location ^~ /pik/flat_sparkline_30d.json {
        limit_req zone=pik_rate burst=30 nodelay;

        proxy_pass http://127.0.0.1:5051;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_hide_header Cache-Control;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Cache-Control "public, max-age=1800" always;
    }

    # Прямой доступ к Datasette по /pik/* — фильтры/детали квартир.
    # `/-/*` уже отрезан выше; здесь оставляем только /pik/.
    location ~ ^/pik/ {
        # Нормальный rate для подгрузок квартир/снапшотов через UI
        limit_req zone=pik_rate burst=20 nodelay;

        proxy_pass http://127.0.0.1:5051;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    # Всё прочее — пробуем как статику, иначе 404
    location / {
        try_files $uri $uri/ =404;
    }
}

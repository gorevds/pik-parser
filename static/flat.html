<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Динамика цены — PIK</title>
<style>
  :root {
    --bg: #f6f7f9;
    --fg: #1f2937;
    --muted: #6b7280;
    --accent: #2563eb;
    --promo: #16a34a;
    --card: #ffffff;
    --border: #e5e7eb;
    --grid: #f1f5f9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
  }
  header {
    background: var(--card);
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; }
  header .sub { color: var(--muted); }
  main { padding: 18px 24px; }
  .grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 18px;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .card h2 {
    margin: 0 0 12px 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .meta {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 16px;
    font-size: 13px;
  }
  .meta dt { color: var(--muted); }
  .meta dd { margin: 0; }
  .meta dd b { font-weight: 600; }
  .price-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .price-row .base { font-size: 22px; font-weight: 600; }
  .price-row .promo { font-size: 22px; font-weight: 600; color: var(--promo); }
  .price-row .struck { font-size: 16px; text-decoration: line-through; color: var(--muted); }
  .price-row .pct {
    background: #dcfce7; color: var(--promo);
    padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 12px;
  }
  .chart-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    min-height: 380px;
  }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .history-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 13px;
  }
  .history-table th, .history-table td {
    text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border);
  }
  .history-table th { color: var(--muted); font-weight: 500; }
  .history-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .history-table tr.promo-row { background: #f0fdf4; }
  .delta-up { color: #b91c1c; }
  .delta-down { color: var(--promo); }
  footer { color: var(--muted); padding: 18px 24px; font-size: 12px; }
</style>
</head>
<body>

<header>
  <a href="/">← все квартиры</a>
  <h1 id="title">…</h1>
  <span class="sub" id="subtitle"></span>
</header>

<main>
  <div class="grid">
    <div>
      <div class="card">
        <h2>Динамика цены</h2>
        <div class="chart-wrap"><canvas id="chart"></canvas></div>
      </div>
      <div class="card" style="margin-top: 16px;">
        <h2>Срезы по дням</h2>
        <table class="history-table" id="hist"></table>
      </div>
    </div>

    <aside>
      <div class="card">
        <h2>Параметры</h2>
        <dl class="meta" id="meta"></dl>
      </div>
      <div class="card" style="margin-top: 16px;">
        <h2>Цена сейчас</h2>
        <div id="now"></div>
      </div>
    </aside>
  </div>
</main>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
const flatId = params.get("id");

function fmt(v) {
  if (v === null || v === undefined) return "—";
  return Number(v).toLocaleString("ru-RU") + " ₽";
}

// XSS-escape для текста, попадающего в .innerHTML
function esc(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

// Разрешаем только http(s) ссылки для внешнего перехода — фильтр от
// javascript:/data: URL'ов, которые мог отдать сорсер с битым полем url.
function safeHref(u) {
  if (!u) return "";
  try {
    const url = new URL(u, location.origin);
    return (url.protocol === "https:" || url.protocol === "http:") ? url.href : "";
  } catch { return ""; }
}

async function loadJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url}: ${r.status}`);
  return r.json();
}

async function main() {
  if (!flatId) {
    document.getElementById("title").textContent = "Нужен параметр ?id=… в URL";
    return;
  }

  // 1. Метаданные квартиры
  const flatRows = await loadJson(
    `/pik/flats.json?id=${encodeURIComponent(flatId)}&_shape=array&_size=1`
  );
  if (!flatRows.length) {
    // textContent — flatId никогда не попадает в HTML-парсер
    document.getElementById("title").textContent =
      `Квартира id=${flatId} не найдена`;
    return;
  }
  const f = flatRows[0];

  // 2. История
  const histRows = await loadJson(
    `/pik/snapshots.json?flat_id=${encodeURIComponent(flatId)}` +
    `&_shape=array&_size=max&_sort=scan_date`
  );

  document.getElementById("title").textContent =
    `${f.bulk_name || "—"}, ${rooms(f.rooms)}, ${f.floor} эт., ${f.area} м²`;
  // f.url из БД мог быть NULL — пропускаем якорь; иначе строим безопасный href.
  const href = safeHref(f.url);
  document.getElementById("subtitle").innerHTML =
    `id <b>${esc(f.id)}</b>` +
    (href ? ` · <a href="${esc(href)}" target="_blank" rel="noopener noreferrer">страница застройщика ↗</a>` : "");
  document.getElementById("footer").textContent =
    `Срезов: ${histRows.length}. Источник: API застройщика + Wayback Machine.`;

  fillMeta(f);
  fillNow(histRows);
  drawChart(histRows);
  fillHistTable(histRows);
}

function rooms(r) {
  if (r === "studio" || r === "-1") return "студия";
  return `${r}-комн`;
}

function fillMeta(f) {
  const meta = document.getElementById("meta");
  // floors_max — этажность всего корпуса; в API не у всех есть, тогда «—»
  const floorOf = f.floors_max ?? "—";
  const kitchenSuffix = f.area_kitchen
    ? ` (кухня ${esc(f.area_kitchen)}, жилая ${esc(f.area_living ?? "—")})`
    : "";
  const rows = [
    // Раньше «Комплекс» и «Корпус» оба заполнялись одним bulk_name (например,
    // «Корпус 8») — в результате обе строки показывали одно и то же. Сейчас
    // bulk_name явно про корпус; комплекс убираем (это и так в заголовке).
    ["Корпус", f.bulk_name || "—"],
    ["Секция", f.section_no ?? "—"],
    // Раньше было `f.rooms_fact ? "?" : "?"` — вырожденный тернарник, всегда
    // выдавал «?». Сейчас «этаж из этажность» через реальный floors_max.
    ["Этаж", `${f.floor ?? "—"} из ${floorOf}`],
    ["Площадь", `${esc(f.area ?? "—")} м²${kitchenSuffix}`],
    ["Заселение", (f.settlement_date || "—").slice(0, 10)],
    ["Артикул", f.name || "—"],
    ["Первый срез", f.first_seen || "—"],
  ];
  meta.innerHTML = rows
    .map(([k, v]) => `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`)
    .join("");
}

function fillNow(rows) {
  if (!rows.length) {
    document.getElementById("now").innerHTML = "<div class='empty'>нет данных</div>";
    return;
  }
  const last = rows[rows.length - 1];
  const has = last.has_promo === 1;
  // fmt/Number-toLocaleString не порождают активный HTML, но status и
  // mortgage_best_name приходят строкой из БД — туда чисто теоретически
  // мог попасть < или > из имени банка/программы. Эскейпим.
  const html = `
    <div class="price-row">
      ${has
        ? `<span class="promo">${fmt(last.promo_price)}</span>
           <span class="struck">${fmt(last.price)}</span>
           <span class="pct">−${esc(last.discount_pct)}%</span>`
        : `<span class="base">${fmt(last.price)}</span>`}
    </div>
    <div style="margin-top: 8px; color: var(--muted); font-size: 12px;">
      ${esc(last.scan_date)} · статус: <b>${esc(last.status || "—")}</b>
      ${last.mortgage_best_name ? `· ${esc(last.mortgage_best_name)}` : ""}
    </div>
  `;
  document.getElementById("now").innerHTML = html;
}

function drawChart(rows) {
  if (!rows.length) return;
  const ctx = document.getElementById("chart");
  const labels = rows.map((r) => r.scan_date);
  const baseData = rows.map((r) => r.price);
  const promoData = rows.map((r) => r.promo_price);
  const haveAnyPromo = rows.some((r) => r.has_promo === 1);

  const datasets = [
    {
      label: "База",
      data: baseData,
      borderColor: "#2563eb",
      backgroundColor: "rgba(37, 99, 235, 0.08)",
      tension: 0.18,
      pointRadius: 4,
      pointHoverRadius: 6,
      fill: !haveAnyPromo,
    },
  ];
  if (haveAnyPromo) {
    datasets.push({
      label: "С ипотечной программой",
      data: promoData,
      borderColor: "#16a34a",
      backgroundColor: "rgba(22, 163, 74, 0.10)",
      tension: 0.18,
      pointRadius: 4,
      pointHoverRadius: 6,
      borderDash: [4, 4],
      fill: false,
    });
  }

  new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { position: "top", align: "end" },
        tooltip: {
          callbacks: {
            label: (c) => `${c.dataset.label}: ${fmt(c.parsed.y)}`,
          },
        },
      },
      scales: {
        y: {
          ticks: { callback: (v) => Number(v).toLocaleString("ru-RU") + " ₽" },
          grid: { color: "var(--grid)" },
        },
        x: { grid: { display: false } },
      },
    },
  });
}

function fillHistTable(rows) {
  if (!rows.length) {
    document.getElementById("hist").innerHTML =
      "<tr><td class='empty'>нет данных</td></tr>";
    return;
  }
  let html = `
    <thead>
      <tr>
        <th>Дата</th>
        <th class="num">База</th>
        <th class="num">С программой</th>
        <th class="num">Δ к прошлому</th>
        <th>Статус</th>
        <th>Программа</th>
      </tr>
    </thead>
    <tbody>
  `;
  let prev = null;
  for (const r of rows) {
    const cls = r.has_promo === 1 ? "promo-row" : "";
    let delta = "—";
    if (prev !== null && r.price && prev) {
      const d = r.price - prev;
      if (d !== 0) {
        const sign = d > 0 ? "+" : "−";
        const cls2 = d > 0 ? "delta-up" : "delta-down";
        delta = `<span class="${cls2}">${sign}${Math.abs(d).toLocaleString("ru-RU")} ₽</span>`;
      } else {
        delta = "0";
      }
    }
    html += `
      <tr class="${cls}">
        <td>${esc(r.scan_date)}</td>
        <td class="num">${fmt(r.price)}</td>
        <td class="num">${r.promo_price ? fmt(r.promo_price) : "—"}</td>
        <td class="num">${delta}</td>
        <td>${esc(r.status || "—")}</td>
        <td>${esc(r.mortgage_best_name || "—")}</td>
      </tr>
    `;
    if (r.price) prev = r.price;
  }
  html += "</tbody>";
  document.getElementById("hist").innerHTML = html;
}

main().catch((e) => {
  // textContent — error.message может содержать стектрейс/URL пользователя
  document.getElementById("title").textContent = "Ошибка: " + e.message;
});
</script>
</body>
</html>

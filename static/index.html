<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Цены на квартиры — топ-застройщики Москвы</title>
<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.1/dist/css/tabulator_modern.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #f6f7f9;
    --fg: #1f2937;
    --muted: #6b7280;
    --accent: #2563eb;
    --promo: #16a34a;
    --promo-bg: #dcfce7;
    --card: #ffffff;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
  }
  header {
    background: var(--card);
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 18px;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
  }
  header .stats {
    color: var(--muted);
    font-size: 13px;
    display: flex;
    gap: 16px;
  }
  header .stats b { color: var(--fg); }
  header a { color: var(--accent); text-decoration: none; }
  header a:hover { text-decoration: underline; }
  main { padding: 16px 24px 24px; }
  /* Sticky-полоса фильтров — остаётся видимой при прокрутке таблицы */
  .controls-sticky {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    margin: -16px -24px 12px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
  }
  .reset-btn {
    color: var(--accent);
    background: transparent !important;
    border: 1px solid transparent !important;
  }
  .reset-btn:hover { border-color: var(--accent) !important; }
  #grid {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .promo-row { background: var(--promo-bg) !important; }
  .promo-badge {
    display: inline-block;
    background: var(--promo);
    color: white;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 11px;
  }
  .tabulator { font-size: 13px; }
  .tabulator-row .tabulator-cell { padding: 6px 10px; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .struck { text-decoration: line-through; color: var(--muted); }
  footer {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 16px;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .controls button {
    border: 1px solid var(--border);
    background: var(--card);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .controls input[type="number"] {
    width: 70px;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .cols-wrap { position: relative; }
  .cols-panel {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,.08);
    max-height: 60vh;
    overflow-y: auto;
    z-index: 100;
    min-width: 220px;
  }
  .cols-panel.open { display: block; }
  .cols-panel label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }
  .cols-panel .cols-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .cols-panel .cols-actions button {
    flex: 1;
    padding: 4px 8px;
    font-size: 12px;
  }
  .metro-type {
    display: inline-block;
    color: var(--muted);
    font-size: 11px;
    margin-right: 4px;
  }
  /* Переключатель «Таблица / Карта» */
  .view-toggle {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-right: 12px;
  }
  .view-toggle button {
    background: var(--card);
    border: none;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    border-right: 1px solid var(--border);
  }
  .view-toggle button:last-child { border-right: none; }
  .view-toggle button.active {
    background: var(--accent);
    color: white;
  }
  #map {
    display: none;
    width: 100%;
    height: calc(100vh - 230px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .map-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 14px;
  }
  /* Сохранённые поиски (фильтры в localStorage) */
  .saved-wrap { position: relative; display: inline-block; }
  .saved-panel {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 260px;
    max-width: 340px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 0;
    box-shadow: 0 6px 20px rgba(0,0,0,.08);
    z-index: 200;
    max-height: 60vh;
    overflow-y: auto;
  }
  .saved-panel.open { display: block; }
  .saved-item {
    display: flex;
    align-items: center;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .saved-item:hover { background: #f1f5f9; }
  .saved-item .label { flex: 1; }
  .saved-item .del {
    color: #94a3b8;
    margin-left: 8px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .saved-item .del:hover { color: #dc2626; background: #fef2f2; }
  .saved-panel .saved-empty {
    padding: 10px 14px;
    color: var(--muted);
    font-size: 12px;
  }
  .saved-panel .saved-actions {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
    display: flex;
    gap: 6px;
  }
  .saved-panel .saved-actions input {
    flex: 1;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
  }
  .saved-panel .saved-actions button {
    padding: 4px 10px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <h1>Цены на квартиры — топ-застройщики Москвы</h1>
  <div class="stats" id="stats">загрузка…</div>
  <div style="margin-left:auto;display:flex;align-items:center">
    <div class="view-toggle" role="tablist" aria-label="Режим отображения">
      <button type="button" role="tab" data-view="table" class="active"
              aria-controls="grid" aria-selected="true">📋 Таблица</button>
      <button type="button" role="tab" data-view="map"
              aria-controls="map" aria-selected="false">🗺 Карта</button>
    </div>
    <a href="/pik/today_all" target="_blank">сырые данные</a>
    ·
    <a href="/pik/snapshots?_sort_desc=scan_date" target="_blank">история</a>
    ·
    <a href="https://github.com/gorevds/pik-parser" target="_blank">репо</a>
  </div>
</header>

<main>
  <div class="controls controls-sticky">
    <span>Застройщик:</span>
    <select id="devFilter"><option value="all">все</option></select>
    <span style="color:var(--muted);margin-left:8px">|</span>
    <span>Город:</span>
    <select id="cityFilter"><option value="all">все</option></select>
    <span style="color:var(--muted);margin-left:8px">|</span>
    <span>ЖК:</span>
    <select id="zkFilter"><option value="all">все</option></select>
    <span style="color:var(--muted);margin-left:8px">|</span>
    <span>Комнат:</span>
    <button data-rooms="all" class="active">все</button>
    <button data-rooms="студия">студии</button>
    <button data-rooms="1к">1к</button>
    <button data-rooms="2к">2к</button>
    <button data-rooms="3к">3к</button>
    <span style="color:var(--muted);margin-left:8px">|</span>
    <span>Цена:</span>
    <input type="number" id="priceMin" placeholder="от" step="0.5" min="0" style="width:64px">
    <span style="color:var(--muted)">—</span>
    <input type="number" id="priceMax" placeholder="до" step="0.5" min="0" style="width:64px">
    <span style="color:var(--muted)">млн ₽</span>
    <span style="color:var(--muted);margin-left:8px">|</span>
    <span>Площадь:</span>
    <input type="number" id="areaMin" placeholder="от" step="1" min="0">
    <span style="color:var(--muted)">—</span>
    <input type="number" id="areaMax" placeholder="до" step="1" min="0">
    <span style="color:var(--muted)">м²</span>
    <span style="color:var(--muted);margin-left:8px">|</span>
    <label><input type="checkbox" id="promoOnly"> только со скидкой</label>
    <label><input type="checkbox" id="hideApart" checked> без апартаментов</label>
    <button id="resetBtn" type="button" class="reset-btn">✕ Сбросить</button>
    <span class="saved-wrap">
      <button id="savedBtn" type="button" class="reset-btn" style="color:var(--accent)">★ Сохранённые</button>
      <div id="savedPanel" class="saved-panel"></div>
    </span>
    <span style="margin-left:auto" class="cols-wrap">
      <button id="colsBtn" type="button">⚙ Колонки</button>
      <div id="colsPanel" class="cols-panel"></div>
    </span>
  </div>
  <div id="grid"></div>
  <div id="map"><div class="map-placeholder">загрузка карты…</div></div>
</main>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
<script>
const fmtMoney = (cell) => {
  const v = cell.getValue();
  if (v === null || v === undefined || v === "") return "";
  return Number(v).toLocaleString("ru-RU") + " ₽";
};
const fmtMeter = (cell) => {
  const v = cell.getValue();
  if (v === null || v === undefined || v === "") return "";
  return Number(v).toLocaleString("ru-RU") + " ₽/м²";
};
const fmtPct = (cell) => {
  const v = cell.getValue();
  if (v === null || v === undefined || v === "") return "";
  if (v === 0) return "—";
  return Number(v).toFixed(1) + "%";
};
const fmtBaseWithStrike = (cell) => {
  const v = cell.getValue();
  if (v === null || v === undefined || v === "") return "";
  const row = cell.getRow().getData();
  const text = Number(v).toLocaleString("ru-RU") + " ₽";
  if (row["промо"] === 1) {
    return `<span class="struck">${text}</span>`;
  }
  return text;
};
const fmtPromoBadge = (cell) => {
  return cell.getValue() === 1 ? `<span class="promo-badge">скидка</span>` : "";
};
const fmtLink = (cell) => {
  const v = cell.getValue();
  if (!v) return "";
  let host = "сайт";
  try { host = new URL(v).hostname.replace(/^www\./, ""); } catch (_) {}
  return `<a href="${v}" target="_blank" rel="noopener">${host} ↗</a>`;
};

// «Заселение» приходит в РАЗНЫХ форматах от разных API:
//   ПИК/А101:  «2026-08-30»  · Level: «1 кв. 2025»  · MR Group: «I кв. 2027»
//   А101 verbose: «I квартал 2027 г.»  · Абсолют: «I кв. 2028»
// Сводим к единому виду «Q3 2026» — короткий, читаемый, сортируемый.
const fmtSettle = (v) => {
  if (!v) return "";
  let m;
  // ISO 2026-08-30 → квартал
  if ((m = v.match(/^(\d{4})-(\d{2})/))) {
    return `Q${Math.floor((parseInt(m[2])-1)/3) + 1} ${m[1]}`;
  }
  // Roman: «I кв. 2027», «II квартал 2025 г.»
  if ((m = v.match(/^([IVX]+)\s*кв/))) {
    const q = {I:1,II:2,III:3,IV:4}[m[1]] || m[1];
    const y = (v.match(/(\d{4})/) || [])[1] || "";
    return `Q${q} ${y}`.trim();
  }
  // Arabic: «3 кв. 2026»
  if ((m = v.match(/^(\d)\s*кв/))) {
    const y = (v.match(/(\d{4})/) || [])[1] || "";
    return `Q${m[1]} ${y}`.trim();
  }
  // Just year «2027»
  if ((m = v.match(/^(\d{4})$/))) return m[1];
  return v.slice(0, 10);
};
// Числовой ключ для сортировки «Q3 2026» → 20263 (год*10 + квартал)
const fmtSettleSort = (v) => {
  if (!v) return 0;
  const f = fmtSettle(v);
  const m = f.match(/Q(\d)\s+(\d{4})/);
  if (m) return parseInt(m[2])*10 + parseInt(m[1]);
  const y = f.match(/(\d{4})/);
  return y ? parseInt(y[1])*10 + 2 : 0;
};

// Подписи кодов городов — синхронно с CITY_CENTERS в pik/geo.py
const CITY_LABELS = {
  msk: "Москва", mo: "МО", spb: "СПб", ekb: "Екб",
  kazan: "Казань", nn: "Н.Новгород", yaroslavl: "Ярославль",
  vladivostok: "Владивосток", khabarovsk: "Хабаровск",
  novorossiisk: "Новороссийск", "yuzhno-sakhalinsk": "Ю-Сахалинск",
  "ulan-ude": "Улан-Удэ", blagoveshchensk: "Благовещенск",
  krasnodar: "Краснодар", tyumen: "Тюмень", obninsk: "Обнинск",
  kaluga: "Калуга", ufa: "Уфа", chelyabinsk: "Челябинск",
  other: "другое",
};
const cityLabel = (code) => CITY_LABELS[code] || code || "";

// Палитра для бейджей застройщиков — стабильные цвета по имени
const DEV_COLORS = {
  "ПИК":      "#0f766e",
  "А101":     "#7c3aed",
  "Донстрой": "#dc2626",
  "Абсолют":  "#ea580c",
  "Level":    "#2563eb",
  "ГК ФСК":   "#65a30d",
  "MR Group": "#0891b2",
};
const fmtDeveloper = (cell) => {
  const v = cell.getValue();
  if (!v) return "";
  const color = DEV_COLORS[v] || "#6b7280";
  return `<span style="background:${color};color:white;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600">${v}</span>`;
};

const rowFormatter = (row) => {
  if (row.getData()["промо"] === 1) {
    row.getElement().classList.add("promo-row");
  }
};

// 4_000_000_153_513 → "40153513": offset (1 цифра) + native (с лидирующими
// нулями до 7 знаков). Глобальный id всё ещё используется в `/flat.html?id=`
// (полная точность сохраняется), здесь только косметика в ячейке.
const NS = 1_000_000_000_000;
const shortId = (id) => {
  if (id == null) return "";
  const off = Math.floor(id / NS), nat = id % NS;
  return off === 0 ? String(nat) : off + String(nat).padStart(7, "0");
};

const columns = [
  {title: "ID", field: "id", width: 100, hozAlign: "right", headerHozAlign: "right",
   headerFilter: "input", formatter: (c) => shortId(c.getValue())},
  {title: "Застройщик", field: "застройщик", width: 120, hozAlign: "center", headerHozAlign: "center",
   headerFilter: "list", formatter: fmtDeveloper,
   headerFilterParams: {values: ["", "ПИК", "А101", "Донстрой", "Абсолют",
                                  "Level", "ГК ФСК", "MR Group"]}},
  {title: "Город", field: "город", width: 130, headerFilter: "input",
   formatter: (c) => cityLabel(c.getValue())},
  {title: "ЖК", field: "жк", width: 175, headerFilter: "input"},
  {title: "Метро", field: "метро", width: 175, headerFilter: "input",
   formatter: (c) => {
     const r = c.getRow().getData();
     const name = c.getValue();
     if (!name) return "";
     const type = r["тип_транспорта"];
     const typeMark = type && type !== "M" ? `<span class="metro-type">${type}</span>` : '';
     return `${typeMark}${name}`;
   }},
  {title: "До метро", field: "мин_пешком", width: 95, hozAlign: "right", headerHozAlign: "right",
   sorter: "number",
   formatter: (c) => c.getValue() != null ? `${c.getValue()} мин` : ""},
  {title: "Линия", field: "линия", width: 165, headerFilter: "input"},
  {title: "Км от центра", field: "км_от_центра", width: 130, hozAlign: "right", headerHozAlign: "right",
   sorter: "number",
   formatter: (c) => c.getValue() != null ? Number(c.getValue()).toFixed(1) + " км" : ""},
  {title: "Комнат", field: "комнат", width: 100, hozAlign: "center", headerHozAlign: "center",
   headerFilter: "list",
   headerFilterParams: {valuesLookup: "all", sortValuesList: "asc"}},
  {title: "Корпус", field: "корпус", width: 130, headerFilter: "input"},
  {title: "Секция", field: "секция", width: 100, hozAlign: "center", headerHozAlign: "center", headerFilter: "input"},
  {title: "Этаж", field: "этаж", width: 95, hozAlign: "center", headerHozAlign: "center",
   sorter: "number", headerFilter: "input",
   formatter: (c) => {
     const r = c.getRow().getData();
     const f = c.getValue();
     const total = r["этажей_всего"];
     if (f == null) return "";
     return total ? `${f} / ${total}` : String(f);
   }},
  {title: "Площадь, м²", field: "площадь_м²", width: 145, hozAlign: "right", headerHozAlign: "right",
   sorter: "number",
   formatter: (c) => c.getValue() != null ? Number(c.getValue()).toFixed(1) : ""},
  {title: "База", field: "базовая_цена", hozAlign: "right", headerHozAlign: "right",
   sorter: "number", formatter: fmtBaseWithStrike, width: 175},
  {title: "С программой", field: "цена_по_программе", hozAlign: "right", headerHozAlign: "right",
   sorter: "number", formatter: fmtMoney, width: 195},
  {title: "Скидка", field: "скидка_%", hozAlign: "right", headerHozAlign: "right",
   sorter: "number", formatter: fmtPct, width: 110},
  // (колонки «Программа» и бейджа скидки убраны — flag промо уже виден
  // через подсветку строки .promo-row + значение в «Скидка %».)
  {title: "База ₽/м²", field: "база_за_м²", hozAlign: "right", headerHozAlign: "right",
   sorter: "number", formatter: fmtMeter, width: 155},
  {title: "Отделка", field: "отделка", width: 195,
   headerFilter: "list", headerFilterParams: {valuesLookup: "all", sortValuesList: "asc"}},
  {title: "Заселение", field: "заселение", width: 110, hozAlign: "center", headerHozAlign: "center",
   sorter: (a, b) => fmtSettleSort(a) - fmtSettleSort(b),
   formatter: (c) => fmtSettle(c.getValue())},
  {title: "Статус", field: "статус", width: 100, hozAlign: "center", headerHozAlign: "center",
   headerFilter: "list", headerFilterParams: {valuesLookup: "all", sortValuesList: "asc"}},
  {title: "График", field: "id", hozAlign: "center", headerHozAlign: "center",
   width: 95, headerSort: false,
   formatter: (c) => {
     const id = c.getValue();
     return id ? `<a href="/flat.html?id=${id}" target="_blank" rel="noopener">📈 история</a>` : "";
   }},
  {title: "План", field: "планировка", width: 80, hozAlign: "center", headerHozAlign: "center",
   headerSort: false,
   formatter: (c) => {
     const v = c.getValue();
     return v ? `<a href="${v}" target="_blank" rel="noopener" title="${v}">📐</a>` : "";
   }},
  {title: "Сайт", field: "ссылка", width: 110, hozAlign: "center", headerHozAlign: "center",
   formatter: fmtLink, headerSort: false},
];

let table;
let allRows = [];
let currentRoom = "all";
let currentCity = "all";
let currentZk = "all";
let currentDev = "all";
let promoOnly = false;
let hideApart = true;   // апартаменты — нежилой фонд, по умолчанию прячем
let areaMin = null;
let areaMax = null;
let priceMin = null;  // в МИЛЛИОНАХ ₽ (поле в шапке вводят как «5», «18»)
let priceMax = null;
const COLS_LS_KEY = "pik:hidden_cols:v1";
const hiddenCols = new Set(JSON.parse(localStorage.getItem(COLS_LS_KEY) || "[]"));

// ─── Сохранённые поиски (localStorage) ───────────────────────
// Хранит снапшоты состояния фильтров под понятным именем. Сохраняем
// все 10 переменных-фильтров: dev/city/zk/room + price/area-from/to
// + promoOnly + hideApart.
const SAVED_LS_KEY = "pik:saved_searches:v1";

// Приведение к Number с проверкой; не-число / NaN / Infinity → null.
const numOrNull = (v) => {
  if (v == null || v === "") return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
};

function readSaved() {
  let raw;
  try { raw = JSON.parse(localStorage.getItem(SAVED_LS_KEY) || "[]"); }
  catch (_) { return []; }
  if (!Array.isArray(raw)) return [];
  // Защита от битых записей (старая схема, ручная правка storage)
  return raw.filter(x =>
    x && typeof x === "object" && typeof x.name === "string"
    && x.filters && typeof x.filters === "object"
  );
}
function writeSaved(list) {
  // Quota / private-mode Safari / отключённый storage — silent-swallow,
  // но в консоль предупреждение. Иначе click-handler упадёт и UI зависнет.
  try {
    localStorage.setItem(SAVED_LS_KEY, JSON.stringify(list));
    return true;
  } catch (e) {
    console.warn("saved searches: не удалось записать", e);
    return false;
  }
}
function snapshotFilters() {
  return {
    dev: currentDev, city: currentCity, zk: currentZk, room: currentRoom,
    priceMin, priceMax, areaMin, areaMax, promoOnly, hideApart,
  };
}
function applySnapshot(s) {
  currentDev = s.dev ?? "all";
  currentCity = s.city ?? "all";
  currentZk = s.zk ?? "all";
  // комната: если значение из снапшота не соответствует кнопке в DOM
  // (расширилась схема, шумная запись) — откатываем на "all", иначе ни
  // одна кнопка не activated, фильтр висит «невидимым».
  const wantedRoom = s.room ?? "all";
  const roomBtns = [...document.querySelectorAll(".controls button[data-rooms]")];
  currentRoom = roomBtns.some(b => b.dataset.rooms === wantedRoom) ? wantedRoom : "all";
  // Числовые фильтры — через numOrNull, иначе строка "5,3" → NaN-фильтр
  priceMin = numOrNull(s.priceMin);
  priceMax = numOrNull(s.priceMax);
  areaMin = numOrNull(s.areaMin);
  areaMax = numOrNull(s.areaMax);
  promoOnly = !!s.promoOnly;
  // hideApart дефолт true (так же как стартовое значение приложения)
  hideApart = s.hideApart !== undefined ? !!s.hideApart : true;
  // Прокатываем по DOM
  for (const [id, val] of [["devFilter", currentDev], ["cityFilter", currentCity]]) {
    const el = document.getElementById(id);
    if (el) el.value = val;
  }
  // zk-dropdown пересоберётся rebuildZkDropdown'ом, но он берёт prevValue
  // из sel.value — поэтому сначала кладём option на лету, чтобы DOM-state
  // соответствовал переменной до пересборки.
  const zkSel = document.getElementById("zkFilter");
  if (zkSel && currentZk !== "all"
      && ![...zkSel.options].some(o => o.value === currentZk)) {
    const opt = document.createElement("option");
    opt.value = currentZk; opt.textContent = currentZk;
    zkSel.appendChild(opt);
  }
  if (zkSel) zkSel.value = currentZk;
  for (const [id, val] of [["priceMin", priceMin], ["priceMax", priceMax],
                            ["areaMin", areaMin], ["areaMax", areaMax]]) {
    const el = document.getElementById(id);
    if (el) el.value = val ?? "";
  }
  const p = document.getElementById("promoOnly");
  if (p) p.checked = promoOnly;
  const h = document.getElementById("hideApart");
  if (h) h.checked = hideApart;
  roomBtns.forEach(b =>
    b.classList.toggle("active", b.dataset.rooms === currentRoom));
  applyFilter();
}

function renderSavedPanel() {
  const panel = document.getElementById("savedPanel");
  const items = readSaved();
  panel.innerHTML = "";
  if (!items.length) {
    const empty = document.createElement("div");
    empty.className = "saved-empty";
    empty.textContent = "Пока ничего не сохранено. Настрой фильтры и нажми «Сохранить».";
    panel.appendChild(empty);
  }
  items.forEach((item, idx) => {
    const row = document.createElement("div");
    row.className = "saved-item";
    const labelBtn = document.createElement("button");
    labelBtn.type = "button";
    labelBtn.className = "label";
    labelBtn.style.cssText = "background:transparent;border:none;cursor:pointer;text-align:left;padding:0";
    labelBtn.textContent = item.name;
    labelBtn.addEventListener("click", () => {
      applySnapshot(item.filters);
      panel.classList.remove("open");
    });
    const del = document.createElement("button");
    del.type = "button"; del.className = "del";
    del.textContent = "✕"; del.title = "Удалить";
    del.style.cssText = "border:none;background:transparent;cursor:pointer";
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      const list = readSaved();
      list.splice(idx, 1);
      writeSaved(list);
      renderSavedPanel();
    });
    row.appendChild(labelBtn); row.appendChild(del);
    panel.appendChild(row);
  });
  // Форма «сохранить текущий»
  const actions = document.createElement("div");
  actions.className = "saved-actions";
  const input = document.createElement("input");
  input.type = "text"; input.placeholder = "название поиска";
  input.maxLength = 50;
  const saveBtn = document.createElement("button");
  saveBtn.type = "button"; saveBtn.textContent = "Сохранить";
  const save = () => {
    const name = input.value.trim();
    if (!name) return;
    const list = readSaved();
    // если имя уже есть — обновляем (а не дублируем)
    const existing = list.findIndex(x => x.name === name);
    const entry = { name, filters: snapshotFilters(), at: Date.now() };
    if (existing >= 0) list[existing] = entry;
    else list.push(entry);
    if (!writeSaved(list)) {
      alert("Не удалось сохранить — браузер блокирует localStorage " +
            "(приватный режим / квота исчерпана).");
      return;
    }
    input.value = "";
    renderSavedPanel();
  };
  saveBtn.addEventListener("click", save);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") save(); });
  actions.appendChild(input); actions.appendChild(saveBtn);
  panel.appendChild(actions);
}

// Generic debounce — на keystroke в полях цена/площадь applyFilter
// пересобирает Tabulator (20k rows) или Yandex маркеры (130 ЖК) — без
// дебаунса заметно лагает при наборе. 200 мс — комфорт vs реактивность.
function debounce(fn, ms = 200) {
  let t;
  return function (...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ─────────────────── КАРТА (Yandex Maps 2.1) ───────────────────
// Принципы:
// — ленивый load API (только когда пользователь впервые жмёт «Карта»);
// — один маркер на ЖК (не на квартиру) — 130 ЖК помещаются без кластера;
// — цвет маркера по avg ₽/м² (зелёный=дешевле, красный=дороже) в РАМКАХ
//   текущего фильтра — динамический градиент;
// — клик по маркеру → balloon с кнопкой «Открыть в таблице» (фильтрует ЖК).
let viewMode = "table";
let ymapsLoaded = false;
let ymapsLoadPromise = null;
let map = null;
let blocksGeo = null;
let blocksGeoPromise = null;

function loadYmaps() {
  if (ymapsLoaded) return Promise.resolve();
  if (ymapsLoadPromise) return ymapsLoadPromise;
  // 10-секундный fallback на случай CSP/блокировщика, где script.onerror
  // не выстреливает (Chrome молча игнорит блок-by-CSP запрос).
  ymapsLoadPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://api-maps.yandex.ru/2.1/?lang=ru_RU";
    s.async = true;
    const timer = setTimeout(() => reject(new Error("таймаут загрузки карты")), 10000);
    s.onload = () => ymaps.ready(() => {
      clearTimeout(timer); ymapsLoaded = true; resolve();
    });
    s.onerror = () => { clearTimeout(timer); reject(new Error("ошибка загрузки Yandex Maps")); };
    document.head.appendChild(s);
  });
  // При сбое — обнуляем кеш промиса, иначе повторный клик «🗺 Карта»
  // вернёт тот же rejected-промис, и пользователь застрянет до перезагрузки.
  ymapsLoadPromise.catch(() => { ymapsLoadPromise = null; });
  return ymapsLoadPromise;
}

function loadBlocksGeo() {
  if (blocksGeo) return Promise.resolve();
  if (blocksGeoPromise) return blocksGeoPromise;
  // _size=1000 — запас на рост (сейчас 130 ЖК); если упрёмся в лимит, логируем
  blocksGeoPromise = fetch("/pik/blocks.json?_shape=array&_size=1000")
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(arr => {
      if (arr.length >= 1000) console.warn("blocksGeo: достигнут лимит 1000");
      blocksGeo = {};
      for (const b of arr) {
        if (b.latitude != null && b.longitude != null) blocksGeo[b.id] = b;
      }
    });
  blocksGeoPromise.catch(() => { blocksGeoPromise = null; });
  return blocksGeoPromise;
}

async function switchView(mode) {
  if (mode === viewMode) return;
  document.querySelectorAll(".view-toggle button").forEach(b => {
    const active = b.dataset.view === mode;
    b.classList.toggle("active", active);
    b.setAttribute("aria-selected", active);
  });
  if (mode === "table") {
    document.getElementById("map").style.display = "none";
    document.getElementById("grid").style.display = "block";
    viewMode = "table";
    applyFilter();
    return;
  }
  // === map ===
  document.getElementById("grid").style.display = "none";
  document.getElementById("map").style.display = "block";
  viewMode = "map";
  try {
    await Promise.all([loadYmaps(), loadBlocksGeo()]);
  } catch (e) {
    document.getElementById("map").innerHTML =
      `<div class="map-placeholder">Карта не загрузилась: ${e.message}.<br>` +
      `Попробуй обновить страницу или вернись в таблицу.</div>`;
    return;
  }
  // Пользователь мог переключиться обратно в таблицу пока шла загрузка
  // карты — игнорируем результат, чтобы не инициализировать ymaps.Map
  // в скрытом контейнере (там layout посчитается как 0x0 и сломается).
  if (viewMode !== "map") return;
  if (!map) {
    map = new ymaps.Map("map", {
      center: [55.752, 37.617], zoom: 10,
      controls: ["zoomControl", "fullscreenControl"]
    });
  }
  renderMapMarkers(filteredRows());
}

function renderMapMarkers(rows) {
  if (!map || !blocksGeo) return;
  map.geoObjects.removeAll();
  // группировка квартир по ЖК (block_id) с пропуском неизвестных координат
  const byBlock = new Map();
  for (const r of rows) {
    if (!blocksGeo[r.block_id]) continue;
    if (!byBlock.has(r.block_id)) byBlock.set(r.block_id, []);
    byBlock.get(r.block_id).push(r);
  }
  if (byBlock.size === 0) return;
  // avg ₽/м² на ЖК
  const flatPrice = (r) => r["цена_по_программе"] || r["базовая_цена"];
  const stats = [];
  for (const [bid, brs] of byBlock) {
    const ppm = brs.map(r => flatPrice(r) / (r["площадь_м²"] || 1)).filter(x => x > 0);
    if (!ppm.length) continue;
    stats.push({
      block: blocksGeo[bid],
      count: brs.length,
      minPrice: Math.min(...brs.map(flatPrice).filter(Boolean)),
      avgPpm: ppm.reduce((a, b) => a + b, 0) / ppm.length,
    });
  }
  if (!stats.length) return;
  const ppms = stats.map(s => s.avgPpm);
  const minPpm = Math.min(...ppms), maxPpm = Math.max(...ppms);
  const range = (maxPpm - minPpm) || 1;
  // экранирование для balloon HTML (имена ЖК могут иметь спецсимволы)
  const esc = (s) => String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  for (const s of stats) {
    // range=0 (все одинаковые) → нейтрально-синий, иначе 120°→0° (зелёный→красный)
    const hue = range === 0 ? 210 : Math.round(120 * (1 - (s.avgPpm - minPpm) / range));
    const color = `hsl(${hue},65%,45%)`;
    const minP = (s.minPrice / 1e6).toFixed(1);
    const avgP = Math.round(s.avgPpm).toLocaleString("ru-RU");
    // Number(...) гарантия что id безопасен для интерполяции (XSS-defence)
    const safeId = Number(s.block.id) || 0;
    const marker = new ymaps.Placemark(
      [s.block.latitude, s.block.longitude],
      {
        hintContent: `${esc(s.block.name)}: ${s.count} кв., от ${minP} М`,
        balloonContent:
          `<b>${esc(s.block.name)}</b><br>` +
          `${s.count} квартир в выборке<br>` +
          `от <b>${minP} М ₽</b><br>` +
          `средняя <b>${avgP} ₽/м²</b><br>` +
          `<button data-action="filter-block" data-block-id="${safeId}" ` +
          `style="margin-top:6px;padding:4px 10px;background:#2563eb;color:white;` +
          `border:none;border-radius:4px;cursor:pointer">Открыть в таблице</button>`,
      },
      { preset: "islands#circleIcon", iconColor: color }
    );
    map.geoObjects.add(marker);
  }
  // Одна точка → bounds нулевой площади → setBounds уходит в zoom 19. Лучше
  // явно центрируем на район. Несколько точек — стандартный fit.
  if (stats.length === 1) {
    map.setCenter([stats[0].block.latitude, stats[0].block.longitude], 14);
  } else {
    try {
      const b = map.geoObjects.getBounds();
      if (b) map.setBounds(b, { checkZoomRange: true, zoomMargin: 40 });
    } catch (_) {}
  }
}

// Делегированный click на balloon-кнопке. data-block-id безопасен (Number()),
// слушатель один на весь document — не утечёт при пересборке маркеров.
document.addEventListener("click", (e) => {
  const btn = e.target.closest && e.target.closest("[data-action='filter-block']");
  if (!btn || !blocksGeo) return;
  const blockId = Number(btn.dataset.blockId);
  const zhk = (blocksGeo[blockId] || {}).name;
  if (!zhk) return;
  currentZk = zhk;
  const sel = document.getElementById("zkFilter");
  if (![...sel.options].some(o => o.value === zhk)) {
    const opt = document.createElement("option");
    opt.value = zhk; opt.textContent = zhk;
    sel.appendChild(opt);
  }
  sel.value = zhk;
  switchView("table");
});

// Вычисляет отфильтрованный набор; не трогает UI. Используется и таблицей,
// и картой (карта тоже должна реагировать на фильтры).
function filteredRows() {
  let rows = allRows;
  if (currentDev !== "all") rows = rows.filter(r => r["застройщик"] === currentDev);
  if (currentCity !== "all") rows = rows.filter(r => r["город"] === currentCity);
  if (currentZk !== "all") rows = rows.filter(r => r["жк"] === currentZk);
  if (currentRoom !== "all") rows = rows.filter(r => r["комнат"] === currentRoom);
  if (promoOnly) rows = rows.filter(r => r["промо"] === 1);
  if (hideApart) rows = rows.filter(r => !r["апартаменты"]);
  if (areaMin != null) rows = rows.filter(r => r["площадь_м²"] != null && r["площадь_м²"] >= areaMin);
  if (areaMax != null) rows = rows.filter(r => r["площадь_м²"] != null && r["площадь_м²"] <= areaMax);
  // Цена в фильтре — миллионы; фильтруем по «итоговой» (с программой если есть,
  // иначе базовой). Так пользователь ищет «что я реально заплачу».
  const flatPrice = (r) => r["цена_по_программе"] || r["базовая_цена"];
  if (priceMin != null) rows = rows.filter(r => flatPrice(r) != null && flatPrice(r) >= priceMin * 1e6);
  if (priceMax != null) rows = rows.filter(r => flatPrice(r) != null && flatPrice(r) <= priceMax * 1e6);
  return rows;
}

function applyFilter() {
  const rows = filteredRows();
  if (viewMode === "table") {
    table.replaceData(rows);
  } else if (viewMode === "map") {
    renderMapMarkers(rows);
  }
  document.getElementById("stats").innerHTML = renderStats(rows);
  rebuildZkDropdown(rows);
}

function buildColsPanel() {
  const panel = document.getElementById("colsPanel");
  panel.innerHTML = "";
  const seen = new Set();
  columns.forEach((col, idx) => {
    const field = col.field;
    const title = col.title || field;
    if (!field) return;
    // дубликат поля (id используется в "ID" и в "График") — отличаем по индексу
    const key = `${field}__${idx}`;
    if (seen.has(key)) return;
    seen.add(key);
    const wrap = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = !hiddenCols.has(key);
    cb.addEventListener("change", () => {
      if (cb.checked) hiddenCols.delete(key);
      else hiddenCols.add(key);
      localStorage.setItem(COLS_LS_KEY, JSON.stringify([...hiddenCols]));
      applyColumnVisibility();
    });
    wrap.appendChild(cb);
    const txt = document.createElement("span");
    txt.textContent = title || "(без названия)";
    wrap.appendChild(txt);
    wrap.dataset.colKey = key;
    panel.appendChild(wrap);
  });

  const actions = document.createElement("div");
  actions.className = "cols-actions";
  const showAll = document.createElement("button");
  showAll.type = "button"; showAll.textContent = "Показать все";
  showAll.addEventListener("click", () => {
    hiddenCols.clear();
    localStorage.setItem(COLS_LS_KEY, "[]");
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
    applyColumnVisibility();
  });
  actions.appendChild(showAll);
  panel.appendChild(actions);
}

function applyColumnVisibility() {
  if (!table) return;
  const seen = new Set();
  columns.forEach((col, idx) => {
    const field = col.field;
    if (!field) return;
    const key = `${field}__${idx}`;
    if (seen.has(key)) return;
    seen.add(key);
    const tcols = table.getColumns();
    // ищем колонку по совпадению field+title (защита от дублей field)
    const match = tcols.find(c => c.getField() === field && (c.getDefinition().title || "") === (col.title || ""));
    if (!match) return;
    if (hiddenCols.has(key)) match.hide();
    else match.show();
  });
}

function rebuildZkDropdown(rows) {
  const zks = [...new Set(rows.map(r => r["жк"]).filter(Boolean))].sort();
  const sel = document.getElementById("zkFilter");
  const prevValue = sel.value;
  sel.innerHTML = '<option value="all">все</option>';
  for (const z of zks) {
    const opt = document.createElement("option");
    opt.value = z; opt.textContent = z;
    if (z === prevValue) opt.selected = true;
    sel.appendChild(opt);
  }
}

function renderStats(rows) {
  if (!rows.length) return "<span>0 квартир</span>";
  const promo = rows.filter(r => r["промо"] === 1).length;
  const prices = rows.map(r => r["базовая_цена"]).filter(Boolean);
  const min = Math.min(...prices), max = Math.max(...prices);
  const avg = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length);
  const date = rows[0]["дата_среза"] || "—";
  const zkCount = new Set(rows.map(r => r["жк"])).size;
  return `
    <span><b>${zkCount}</b> ЖК</span>
    <span><b>${rows.length}</b> квартир</span>
    <span>цена: <b>${min.toLocaleString("ru-RU")}</b> – <b>${max.toLocaleString("ru-RU")}</b> ₽</span>
    <span>средняя: <b>${avg.toLocaleString("ru-RU")}</b> ₽</span>
    <span>со скидкой: <b>${promo}</b></span>
    <span>срез: <b>${date}</b></span>
  `;
}

async function load() {
  const resp = await fetch("/pik/today_all.json?_shape=array&_size=25000");
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const rows = await resp.json();
  allRows = rows;

  // Populate developer dropdown — порядок «ПИК сначала» (offset 0), затем
  // по убыванию числа квартир, чтобы наиболее заполненные шли вверх
  const devCounts = rows.reduce((acc, r) => {
    const d = r["застройщик"]; if (d) acc[d] = (acc[d] || 0) + 1;
    return acc;
  }, {});
  const devs = Object.entries(devCounts).sort((a, b) => b[1] - a[1]);
  const devSel = document.getElementById("devFilter");
  for (const [d, n] of devs) {
    const opt = document.createElement("option");
    opt.value = d; opt.textContent = `${d} (${n})`;
    devSel.appendChild(opt);
  }
  devSel.addEventListener("change", (e) => {
    currentDev = e.target.value;
    currentZk = "all";
    applyFilter();
  });

  // Populate city dropdown
  const cities = [...new Set(rows.map(r => r["город"]).filter(Boolean))].sort();
  const citySel = document.getElementById("cityFilter");
  for (const c of cities) {
    const opt = document.createElement("option");
    opt.value = c; opt.textContent = cityLabel(c);
    citySel.appendChild(opt);
  }
  citySel.addEventListener("change", (e) => {
    currentCity = e.target.value;
    currentZk = "all";
    applyFilter();
  });
  // Populate ЖК-фильтр (initially all)
  rebuildZkDropdown(rows);
  document.getElementById("zkFilter").addEventListener("change", (e) => {
    currentZk = e.target.value;
    applyFilter();
  });

  table = new Tabulator("#grid", {
    data: rows,
    columns,
    layout: "fitData",
    height: "calc(100vh - 230px)",
    rowFormatter,
    initialSort: [{column: "базовая_цена", dir: "asc"}],
    pagination: false,
    persistence: false,
  });

  table.on("tableBuilt", () => {
    applyColumnVisibility();
    applyFilter();
  });

  document.querySelectorAll(".controls button[data-rooms]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const clicked = btn.dataset.rooms;
      // Повторный клик по активной не-"all" кнопке сбрасывает фильтр
      const nextRoom = (clicked !== "all" && currentRoom === clicked) ? "all" : clicked;
      document.querySelectorAll(".controls button[data-rooms]").forEach(b => {
        b.classList.toggle("active", b.dataset.rooms === nextRoom);
      });
      currentRoom = nextRoom;
      applyFilter();
    });
  });
  // Цена от/до — оба поля живут синхронно, debounce на keystroke
  const onPriceChange = debounce(() => {
    const a = document.getElementById("priceMin").value.trim();
    const b = document.getElementById("priceMax").value.trim();
    priceMin = a === "" ? null : Number(a);
    priceMax = b === "" ? null : Number(b);
    applyFilter();
  });
  document.getElementById("priceMin").addEventListener("input", onPriceChange);
  document.getElementById("priceMax").addEventListener("input", onPriceChange);

  // ✕ Сбросить — обнуляем все переменные, dropdown'ы и инпуты.
  // hideApart НЕ сбрасываем (это безопасный дефолт «без апартаментов»).
  document.getElementById("resetBtn").addEventListener("click", () => {
    currentDev = currentCity = currentZk = currentRoom = "all";
    promoOnly = false;
    priceMin = priceMax = areaMin = areaMax = null;
    for (const id of ["devFilter","cityFilter","zkFilter"])
      document.getElementById(id).value = "all";
    for (const id of ["priceMin","priceMax","areaMin","areaMax"])
      document.getElementById(id).value = "";
    document.getElementById("promoOnly").checked = false;
    document.querySelectorAll(".controls button[data-rooms]").forEach(b =>
      b.classList.toggle("active", b.dataset.rooms === "all"));
    applyFilter();
  });

  document.getElementById("promoOnly").addEventListener("change", (e) => {
    promoOnly = e.target.checked;
    applyFilter();
  });
  document.getElementById("hideApart").addEventListener("change", (e) => {
    hideApart = e.target.checked;
    applyFilter();
  });
  // Toggle Таблица / Карта
  document.querySelectorAll(".view-toggle button").forEach(b => {
    b.addEventListener("click", () => switchView(b.dataset.view));
  });
  // Сохранённые поиски: открыть/закрыть панель
  const savedBtn = document.getElementById("savedBtn");
  const savedPanel = document.getElementById("savedPanel");
  savedBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!savedPanel.classList.contains("open")) renderSavedPanel();
    savedPanel.classList.toggle("open");
  });
  document.addEventListener("click", (e) => {
    if (!savedPanel.contains(e.target) && e.target !== savedBtn) {
      savedPanel.classList.remove("open");
    }
  });

  const onAreaChange = debounce(() => {
    const minV = document.getElementById("areaMin").value.trim();
    const maxV = document.getElementById("areaMax").value.trim();
    areaMin = minV === "" ? null : Number(minV);
    areaMax = maxV === "" ? null : Number(maxV);
    applyFilter();
  });
  document.getElementById("areaMin").addEventListener("input", onAreaChange);
  document.getElementById("areaMax").addEventListener("input", onAreaChange);

  buildColsPanel();
  const colsBtn = document.getElementById("colsBtn");
  const colsPanel = document.getElementById("colsPanel");
  colsBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    colsPanel.classList.toggle("open");
  });
  document.addEventListener("click", (e) => {
    if (!colsPanel.contains(e.target) && e.target !== colsBtn) {
      colsPanel.classList.remove("open");
    }
  });

  const last = rows[0]?.["дата_среза"] || "—";
  document.getElementById("footer").textContent =
    `Источники: 7 застройщиков — ПИК, А101, Донстрой, Абсолют, Level, ГК ФСК, MR Group. ` +
    `Скан ежедневно в 06:00 МСК. Последний срез: ${last}.`;
}
load().catch((e) => {
  document.getElementById("grid").innerHTML =
    `<div style="padding:24px;color:#b91c1c">Ошибка загрузки: ${e}</div>`;
});
</script>
</body>
</html>
